appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_briko"

- waitForAnimationToEnd

- tapOn:
    text: "Open" # Taps the Play Store "Open" button
    optional: true # Won't fail if Play Store doesn't appear

- waitForAnimationToEnd

- assertVisible: BRIKO
- stopApp
