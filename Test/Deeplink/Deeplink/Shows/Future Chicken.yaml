appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: https://mikoai.app.link/talent_future_chicken

- waitForAnimationToEnd

- tapOn:
    text: "Open" # Taps the Play Store "Open" button
    optional: true # Won't fail if Play Store doesn't appear

- waitForAnimationToEnd
- assertVisible: FUTURE CHICKEN

# - takeScreenshot: FutureChicken
# - assertScreenshot:
#     path: FutureChicken.png
#     thresholdPercentage: 50

- doubleTapOn:
    point: 6%,10%

#- assertVisible: PLAY
- stopApp
