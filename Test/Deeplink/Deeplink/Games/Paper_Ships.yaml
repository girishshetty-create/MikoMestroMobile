appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_paper_ships"

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
- takeScreenshot: Paper_Ships
- assertScreenshot:
    path: Paper_Ships.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
