appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_robotic_counting"

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Robotic_Counting
- assertScreenshot:
    path: Robotic_Counting.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
