appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_boj_coloring_book"

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Boj_Coloring_Book
- assertScreenshot:
    path: Boj_Coloring_Book.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
