appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_brain_rail"

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Brain_Rail
- assertScreenshot:
    path: Brain_Rail.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
