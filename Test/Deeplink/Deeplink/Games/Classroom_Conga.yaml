appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_classroom_conga"

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Classroom_Conga
- assertScreenshot:
    path: Classroom_Conga.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
