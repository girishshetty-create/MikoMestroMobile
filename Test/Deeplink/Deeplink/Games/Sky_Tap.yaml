appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: https://mikoai.app.link/talent_sky_tap

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: SkyTap
- assertScreenshot:
    path: SkyTap.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
