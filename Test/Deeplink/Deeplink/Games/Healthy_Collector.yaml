appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_healthy_collector"

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Healthy_Collector
- assertScreenshot:
    path: Healthy_Collector.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
