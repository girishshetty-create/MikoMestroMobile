appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_chess_classic"

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Chess_Classic
- assertScreenshot:
    path: Chess_Classic.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
