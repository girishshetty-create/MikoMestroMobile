appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: https://mikoai.app.link/talent_space_odyssey

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Space_Odyssey
- assertScreenshot:
    path: Space_Odyssey.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
