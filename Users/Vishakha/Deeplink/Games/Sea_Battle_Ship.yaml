appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_sea_battle_ship"

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Sea_Battle_Ship
- assertScreenshot:
    path: Sea_Battle_Ship.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
