appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: https://mikoai.app.link/talent_rift_land

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Rift_Land
- assertScreenshot:
    path: Rift_Land.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
