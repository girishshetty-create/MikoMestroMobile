appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: https://mikoai.app.link/talent_math_circus

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Math_Circus
- assertScreenshot:
    path: Math_Circus.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
