appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_hungry_toads"

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Hungry_Toads
- assertScreenshot:
    path: Hungry_Toads.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
