appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_lazy_robber"

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Lazy_Robber
- assertScreenshot:
    path: Lazy_Robber.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
