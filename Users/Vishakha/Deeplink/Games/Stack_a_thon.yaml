appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: https://mikoai.app.link/talent_stack_a_thon

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Stack_a_thon
- assertScreenshot:
    path: Stack_a_thon.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
