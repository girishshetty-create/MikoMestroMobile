appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_clash_critters"

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Clash_Critters
- assertScreenshot:
    path: Clash_Critters.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
