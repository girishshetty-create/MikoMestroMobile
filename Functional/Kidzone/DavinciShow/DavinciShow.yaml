appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_davinci_shows"

- waitForAnimationToEnd

- tapOn:
    text: "Open" # Taps the Play Store "Open" button
    optional: true # Won't fail if Play Store doesn't appear

- assertVisible: Da Vinci

- stopApp
