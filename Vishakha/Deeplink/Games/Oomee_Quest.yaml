appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_oomee_quest"

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Oomee_Quest
- assertScreenshot:
    path: Oomee_Quest.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
