appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_climb_o_weight"

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Climb_o_Weight
- assertScreenshot:
    path: Climb_o_Weight.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
