appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_color_attack"

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Color_Attack
- assertScreenshot:
    path: Color_Attack.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
