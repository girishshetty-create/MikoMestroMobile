appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: "https://mikoai.app.link/talent_nom_nom_yum"

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
# - takeScreenshot: Nom_Nom_Yum
- assertScreenshot:
    path: Nom_Nom_Yum.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
