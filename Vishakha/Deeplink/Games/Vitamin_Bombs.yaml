appId: com.miko3.app
---
- launchApp:
    clearState: false

- openLink: https://mikoai.app.link/talent_vitamin_bombs

- waitForAnimationToEnd

- tapOn:
    text: "Open"
    optional: true

- waitForAnimationToEnd
- takeScreenshot: Vitamin_Bombs
- assertScreenshot:
    path: Vitamin_Bombs.png
    thresholdPercentage: 70

- doubleTapOn:
    point: 6%,10%

- stopApp
